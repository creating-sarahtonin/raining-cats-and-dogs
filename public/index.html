<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Raining Cats and Dogs</title>
  <style>
    html,body, #app { height: 100%; margin:0; }
    body { background: #0b2340; color: #fff; display:flex; align-items:center; justify-content:center; font-family: Arial, Helvetica, sans-serif }
    .center { text-align:center }
    .start { display:inline-block; margin-top:20px; padding:12px 24px; background:#2ecc71; color:#003; font-weight:700; border-radius:8px; cursor:pointer }
    .hint { margin-top:10px; color:#cde }
  </style>
</head>
<body>
  <div id="app" class="center">
    <h1>I think it’s about to rain cats and dogs…</h1>
    <p>Will you help catch them?</p>
    <div class="start" id="startBtn">START</div>
    <div class="hint">Use ← and → arrow keys to move the basket. Catch only cats and dogs.</div>
  </div>
  <script src="/../src/main.js"></script>
</body>
</html>
