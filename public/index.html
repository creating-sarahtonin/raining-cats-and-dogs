<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Raining Cats and Dogs</title>
  <style>
    html,body { height:100%; margin:0; }
    body { background:#0b2340; color:#fff; font-family: Arial, Helvetica, sans-serif; }
    #app { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; position:relative }
    .center { text-align:center }
    .start { display:inline-block; margin-top:20px; padding:12px 24px; background:#2ecc71; color:#003; font-weight:700; border-radius:8px; cursor:pointer }
    .hint { margin-top:10px; color:#cde }
    canvas { display:block; background: linear-gradient(#0b2340, #021027); width:100%; height:100%; }
    #hud { position:absolute; top:8px; left:8px; font-weight:700 }
    #timer { position:absolute; top:8px; right:8px }
  </style>
</head>
<body>
  <div id="app">
    <div id="landing" class="center">
      <h1>I think it’s about to rain cats and dogs…</h1>
      <p>Will you help catch them?</p>
      <div id="startBtn" class="start">START</div>
      <div class="hint">Use ← and → arrow keys to move the basket. Catch only cats and dogs.</div>
    </div>
    <div id="gameArea" style="display:none; width:100%; height:100%;">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">Score: <span id="score">0</span></div>
      <div id="timer">Time: <span id="time">60</span>s</div>
    </div>
  </div>
  <script src="../src/game.js"></script>
</body>
</html>
