<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Body -->
  <ellipse cx="64" cy="75" rx="30" ry="28" fill="#666666"/>
  <!-- Head -->
  <circle cx="64" cy="50" r="25" fill="#666666"/>
  <!-- Ears -->
  <polygon points="45,35 40,15 50,30" fill="#666666"/>
  <polygon points="83,35 88,15 78,30" fill="#666666"/>
  <!-- Mask (black stripe) -->
  <path d="M 50 45 L 45 50 L 50 55 L 78 55 L 83 50 L 78 45" fill="#000000"/>
  <!-- Eyes (white circles with black pupils) -->
  <circle cx="55" cy="48" r="6" fill="#fff"/>
  <circle cx="73" cy="48" r="6" fill="#fff"/>
  <circle cx="55" cy="48" r="3" fill="#000"/>
  <circle cx="73" cy="48" r="3" fill="#000"/>
  <!-- Nose -->
  <ellipse cx="64" cy="60" rx="4" ry="3" fill="#000"/>
  <!-- Mouth -->
  <path d="M 64 62 Q 60 65 55 64" stroke="#000" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 64 62 Q 68 65 73 64" stroke="#000" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M 80 95 Q 90 90 92 75" stroke="#666666" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>