<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Raining Cats and Dogs</title>
  <style>
    html,body { height:100%; margin:0; }
    body { background:linear-gradient(135deg, #001a4d 0%, #000d26 50%, #001f3f 100%); color:#fff; font-family: Arial, Helvetica, sans-serif; overflow: hidden; }
    #app { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; position:relative }
    
    #landing { 
      text-align:center; 
      z-index: 10;
      animation: fadeIn 0.8s ease-in;
      position: relative;
    }
    
    .window-frame {
      width: 90%;
      max-width: 1000px;
      height: 600px;
      border: 12px solid #2c3e50;
      border-radius: 15px;
      background: linear-gradient(135deg, #001a4d, #000d26);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      margin-bottom: 30px;
    }
    
    .window-rain {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(100,150,255,0.05);
    }
    
    .raindrop {
      position: absolute;
      width: 2px;
      height: 12px;
      background: rgba(150,200,255,0.7);
      animation: rainFall linear infinite;
    }
    
    @keyframes rainFall {
      to { transform: translateY(600px); }
    }
    
    .window-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 20px;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    #landing h1 { 
      font-size: 3em; 
      padding: 20px;
      white-space: nowrap;
      margin: 0 0 20px 0;
      text-shadow: 0 4px 8px rgba(0,0,0,0.5);
      background: linear-gradient(45deg, #fdfdfd, #8686b1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    #landing p { 
      font-size: 1.3em;
      color: #cde;
      margin: 10px 0;
      font-style: italic;
    }
    
    .start { 
      display:inline-block; 
      margin-top:20px; 
      padding:16px 40px; 
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color:#fff; 
      font-weight:700; 
      font-size: 1.2em;
      border-radius:12px; 
      cursor:pointer;
      border: 2px solid #1abc9c;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
    }
    
    .start:hover { 
      transform: scale(1.08);
      box-shadow: 0 6px 25px rgba(46, 204, 113, 0.7);
    }
    
    .start:active {
      transform: scale(0.96);
    }
    
    .hint { 
      margin-top:20px; 
      color:#cde;
      font-size: 0.95em;
      font-style: italic;
      line-height: 1.5;
    }
    
    .animals-display {
      font-size: 2.5em;
      margin: 15px 0;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }
    
    canvas { display:block; background: linear-gradient(#001a4d, #000d26); width:100%; height:100%; }
    #hud { 
      position:absolute; 
      top:20px; 
      left:20px; 
      font-weight:700;
      font-size: 1.3em;
      background: rgba(0,0,0,0.4);
      padding: 10px 15px;
      border-radius: 8px;
      border-left: 4px solid #2ecc71;
    }
    #timer { 
      position:absolute; 
      top:20px; 
      right:20px;
      font-weight:700;
      font-size: 3em;
      background: rgba(255, 50, 50, 0.3);
      padding: 15px 25px;
      border-radius: 12px;
      border: 3px solid #ff3232;
      min-width: 160px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255,50,50,0.3);
    }
  </style>
  </style>
</head>
<body>
  <div id="app">
    <div id="landing" class="center">
      <div class="window-frame">
        <div class="window-rain" id="windowRain"></div>
        <div class="window-content">
          <h1>🌧️ Raining Cats and Dogs 🌧️</h1>
          <p>Can you catch them before the storm passes?</p>
          <div class="animals-display">🐱 🐕 🐈 🐶</div>
          <div id="startBtn" class="start">☔ START GAME ☔</div>
          <div class="hint">✓ Catch cats & dogs for points<br>✗ Avoid hazards<br>Use ← → arrows to move the basket<br>Build combos for bonus points!</div>
        </div>
      </div>
    </div>
    <div id="gameArea" style="display:none; width:100%; height:100%;">
      <canvas id="gameCanvas"></canvas>
      <div id="hud">Score: <span id="score">0</span></div>
      <div id="timer"><span id="time">30</span>s</div>
    </div>
  </div>
  <script src="../src/game.js"></script>
  <script>
    // Animate rain on window
    const windowRain = document.getElementById('windowRain');
    if(windowRain){
      for(let i = 0; i < 40; i++){
        const drop = document.createElement('div');
        drop.className = 'raindrop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.top = Math.random() * -100 + '%';
        drop.style.animationDuration = (2 + Math.random() * 2) + 's';
        drop.style.animationDelay = Math.random() * 2 + 's';
        windowRain.appendChild(drop);
      }
    }
  </script>
